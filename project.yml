name: Eidos
options:
  bundleIdPrefix: com.eidos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

targets:
  Eidos:
    type: application
    platform: iOS
    sources:
      - path: Eidos
        excludes:
          - "Resources/Info.plist"
          - "Resources/Eidos.entitlements"
    resources:
      - path: Eidos/Resources
        excludes:
          - "Info.plist"
          - "Eidos.entitlements"
    info:
      path: Eidos/Resources/Info.plist
    entitlements:
      path: Eidos/Resources/Eidos.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eidos.app
        CODE_SIGN_ENTITLEMENTS: Eidos/Resources/Eidos.entitlements
        INFOPLIST_FILE: Eidos/Resources/Info.plist
    dependencies:
      - target: EidosShareExtension
    # TODO(phase 2): Add LiteRT-LM dependency.
    # Source: github.com/google-ai-edge/LiteRT-LM
    # Confirm iOS distribution mechanism (SPM vs. xcframework vs. source build)
    # on the first Mac session, then add the appropriate entry here.
    # The deprecated MediaPipeTasksGenAI pod referenced in architecture.md is
    # NOT used — see plan.md §A1.

  EidosShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: EidosShareExtension
        excludes:
          - "Info.plist"
          - "EidosShareExtension.entitlements"
    info:
      path: EidosShareExtension/Info.plist
    entitlements:
      path: EidosShareExtension/EidosShareExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eidos.app.ShareExtension
        CODE_SIGN_ENTITLEMENTS: EidosShareExtension/EidosShareExtension.entitlements
        INFOPLIST_FILE: EidosShareExtension/Info.plist

  EidosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EidosTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eidos.app.tests
    dependencies:
      - target: Eidos

schemes:
  Eidos:
    build:
      targets:
        Eidos: all
        EidosShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EidosTests
    archive:
      config: Release
