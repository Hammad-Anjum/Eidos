name: Eidos
options:
  bundleIdPrefix: com.hissamuddin
  deploymentTarget:
    # iOS 26+ unlocks Apple's Foundation Models framework (`@Generable`
    # for grammar-constrained structured output), required for 100%
    # valid tool-call JSON. Realistic minimum anyway since Gemma 4 via
    # MLX needs Apple Silicon A17+ which correlates with iOS 26 devices.
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0

targets:
  Eidos:
    type: application
    platform: iOS
    # Mac Catalyst is the dev-testing target. It gives the app access
    # to the full system RAM (128 GB on the user's machine) — no iPad
    # jetsam, no memory pressure on the 3.58 GB Gemma 4 model. One-time
    # re-download into the Catalyst sandbox, then unrestricted testing.
    # iPhone build paths (iOS device, iOS simulator) are still valid
    # destinations for device-specific validation.
    supportedDestinations:
      - iOS
      - macCatalyst
    sources:
      - path: Eidos
        excludes:
          - "Resources/Info.plist"
          - "Resources/Eidos.entitlements"
      - path: EidosShared
    resources:
      - path: Eidos/Resources
        excludes:
          - "Info.plist"
          - "Eidos.entitlements"
    info:
      path: Eidos/Resources/Info.plist
      properties:
        # Marketing + build version. Bumped each tester drop so the
        # ModelDownloader fresh-download marker (`fresh.<short>.<build>`)
        # auto-rotates and forces a clean state.
        CFBundleShortVersionString: "1.0.12"
        CFBundleVersion: "12"
        NSMicrophoneUsageDescription: "Eidos transcribes your voice on-device so you can chat hands-free. Audio never leaves your iPhone."
        NSSpeechRecognitionUsageDescription: "Eidos uses Apple's on-device speech recognition to turn your voice into text. Your speech is never sent to a server."
        NSCalendarsFullAccessUsageDescription: "Eidos reads your calendar to give you context-aware briefings and reminders. Event data never leaves your iPhone."
        NSContactsUsageDescription: "Eidos uses your contacts to understand who you mean when you say names. Contact data never leaves your iPhone."
        NSRemindersFullAccessUsageDescription: "Eidos reads and creates reminders on your behalf. Reminder data never leaves your iPhone."
        NSHealthShareUsageDescription: "Eidos reads a minimal set of health metrics (sleep, steps, heart rate, active energy) to personalize your morning briefing. Data never leaves your iPhone — only insights are stored."
        NSHealthUpdateUsageDescription: "Eidos doesn't write to HealthKit. This permission is required by iOS when requesting any health access."
        LSApplicationQueriesSchemes:
          - whatsapp
          - sms
          - mailto
          - tel
          - maps
          - comgooglemaps
          - uber
          - facetime
        CFBundleURLTypes:
          - CFBundleURLName: com.hissamuddin.eidos
            CFBundleURLSchemes:
              - eidos
        NSLocationWhenInUseUsageDescription: "Eidos notes the places you go (home, work, gym) so your briefing knows your context. Location never leaves your iPhone."
        NSLocationAlwaysAndWhenInUseUsageDescription: "For ambient place memory, allow Always. Eidos records only significant changes — never your exact path — and only on-device."
        NSMotionUsageDescription: "Eidos uses motion activity (walking, running, driving) and step count to personalize your briefing. Never leaves your iPhone."
        NSAppleMusicUsageDescription: "Eidos can weave your recently-played Apple Music into your briefing. Music history never leaves your iPhone."
        NSCameraUsageDescription: "Eidos uses the camera so you can snap a photo and ask questions about it. Images are processed on-device and never uploaded."
        NSPhotoLibraryUsageDescription: "Eidos reads photos you explicitly pick so you can ask questions about them. Images are processed on-device and never uploaded."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        # iOS 14+ launch-screen definition. Without this, iOS assumes
        # the app is pre-iPhone-X and letterboxes the UI with big black
        # bars on top and bottom. An empty dict = "use a default blank
        # launch screen that respects the full display."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Background processing for the proactive nudge task. Without
        # `processing` in `UIBackgroundModes`, BGTaskScheduler refuses
        # to fire `com.hissamuddin.eidos.nudges.daily`. The identifier
        # below is matched against `BGTaskSchedulerPermittedIdentifiers`
        # at register-time — typo'ing either side breaks scheduling
        # silently.
        UIBackgroundModes:
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.hissamuddin.eidos.nudges.daily
        # NOTE: `UIRequiresFullScreen` was removed — iOS 26 deprecates
        # the key, and our app already works full-screen by nature of
        # the UIKit life cycle + `UILaunchScreen`.
    entitlements:
      path: Eidos/Resources/Eidos.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.hissamuddin.eidos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hissamuddin.eidos
        CODE_SIGN_ENTITLEMENTS: Eidos/Resources/Eidos.entitlements
        INFOPLIST_FILE: Eidos/Resources/Info.plist
        # Mac Catalyst: native macOS app, full system RAM access.
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_UIKITFORMAC: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
    dependencies:
      # Extensions are iOS-only; skipped when building for Mac Catalyst
      # (Catalyst is a macOS platform and can't embed iOS `.appex` bundles).
      - target: EidosShareExtension
        platformFilter: iOS
      - target: EidosWidget
        platformFilter: iOS
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXVLM         # Phase 8.4c: vision-language models (Gemma 4 image / audio)
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-huggingface
        product: HuggingFace

  EidosShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: EidosShareExtension
        excludes:
          - "Info.plist"
          - "EidosShareExtension.entitlements"
    info:
      path: EidosShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Eidos Share
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsFileWithMaxCount: 5
    entitlements:
      path: EidosShareExtension/EidosShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hissamuddin.eidos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hissamuddin.eidos.ShareExtension
        CODE_SIGN_ENTITLEMENTS: EidosShareExtension/EidosShareExtension.entitlements
        INFOPLIST_FILE: EidosShareExtension/Info.plist

  EidosWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: EidosWidget
        excludes:
          - "Info.plist"
          - "EidosWidget.entitlements"
      - path: EidosShared
    info:
      path: EidosWidget/Info.plist
      properties:
        CFBundleDisplayName: Eidos
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: EidosWidget/EidosWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hissamuddin.eidos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hissamuddin.eidos.Widget
        CODE_SIGN_ENTITLEMENTS: EidosWidget/EidosWidget.entitlements
        INFOPLIST_FILE: EidosWidget/Info.plist

  EidosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EidosTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hissamuddin.eidos.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Eidos

schemes:
  Eidos:
    build:
      targets:
        Eidos: all
        EidosShareExtension: all
        EidosWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EidosTests
    archive:
      config: Release
