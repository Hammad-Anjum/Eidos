name: Android CI

on:
  push:
    branches: [eidos-android]
  pull_request:
    branches: [eidos-android]

# Keep jobs light — no emulator / instrumented tests on free runners.
# Instrumented tests run on the self-hosted runner (gaming PC) or locally.

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Lint (debug)
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: eidos-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
